name: Weekly Email Digest

on:
  schedule:
    - cron: '0 9 * * 1'  # every Monday 9am UTC
  workflow_dispatch:       # manual trigger from Actions tab

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Send weekly digest (all subscribers)
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: python3 send_digest.py

      - name: Send per-topic filtered digests
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: |
          for topic in kubernetes linux-kernel ubuntu debian windows openstack macos cisco fortinet vmware android nginx; do
            echo "--- topic: $topic ---"
            python3 send_digest.py --topic "$topic" || echo "[warn] $topic failed, continuing"
          done
