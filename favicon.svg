<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded square background -->
  <rect width="32" height="32" rx="6" fill="#0f172a"/>
  <!-- Shield body -->
  <path d="M16 3.5 L27 7.5 L27 17 C27 23.5 22 28 16 30.5 C10 28 5 23.5 5 17 L5 7.5 Z" fill="#1e3a8a"/>
  <!-- Shield highlight edge -->
  <path d="M16 3.5 L27 7.5 L27 17 C27 23.5 22 28 16 30.5 C10 28 5 23.5 5 17 L5 7.5 Z" fill="none" stroke="#3b82f6" stroke-width="0.75" opacity="0.5"/>
  <!-- V letterform — two thick strokes meeting at bottom -->
  <path d="M10 10 L13.5 10 L16 18.5 L18.5 10 L22 10 L16 24 Z" fill="#60a5fa"/>
  <!-- Small red critical dot top-right -->
  <circle cx="25" cy="7" r="4" fill="#dc2626"/>
  <circle cx="25" cy="7" r="2.2" fill="#fca5a5"/>
</svg>
